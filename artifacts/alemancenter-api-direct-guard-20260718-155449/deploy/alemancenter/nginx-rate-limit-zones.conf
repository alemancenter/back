# alemancenter.com — shared Nginx rate-limit zones
#
# INSTALLATION: This file must live in the http {} context, NOT inside a server block.
# Copy to /etc/nginx/conf.d/alemancenter-rate-limit.conf and then:
#   nginx -t && nginx -s reload
#
# Plesk "Additional Nginx Directives" is server-context only, so limit_req_zone
# declarations cannot go there — they must be in a separate conf.d file.

# OAuth redirect endpoints (Google / Facebook login entry-point)
# 10 requests per minute per IP; burst of 5 served immediately.
# Blocks bots that probe these endpoints in rapid succession.
limit_req_zone $binary_remote_addr zone=oauth_redirect:10m rate=10r/m;

# General auth endpoints (login, register, password reset …)
# 30 requests per minute per IP; burst of 10.
limit_req_zone $binary_remote_addr zone=auth_general:10m rate=30r/m;
