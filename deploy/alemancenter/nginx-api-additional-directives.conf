# api.alemancenter.com — Plesk Additional Nginx Directives
# Go Fiber internal port 127.0.0.1:8082
#
# Rate limiting zones are defined in the http context:
#   /etc/nginx/conf.d/alemancenter-rate-limit.conf
# Run: nginx -t && nginx -s reload after installing that file.

# OAuth redirect endpoints — strict rate limiting before hitting Go
# limit_req zone must exist in /etc/nginx/conf.d/alemancenter-rate-limit.conf
location = /api/auth/google/redirect {
    limit_req zone=oauth_redirect burst=5 nodelay;
    limit_req_status 429;
    add_header Retry-After 60 always;
    add_header X-Robots-Tag "noindex, nofollow" always;

    proxy_pass http://127.0.0.1:8082;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Forwarded-Host $host;
    proxy_connect_timeout 10s;
    proxy_send_timeout 30s;
    proxy_read_timeout 30s;
    proxy_no_cache 1;
    proxy_cache_bypass 1;
}

location = /api/auth/facebook/redirect {
    limit_req zone=oauth_redirect burst=5 nodelay;
    limit_req_status 429;
    add_header Retry-After 60 always;
    add_header X-Robots-Tag "noindex, nofollow" always;

    proxy_pass http://127.0.0.1:8082;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Forwarded-Host $host;
    proxy_connect_timeout 10s;
    proxy_send_timeout 30s;
    proxy_read_timeout 30s;
    proxy_no_cache 1;
    proxy_cache_bypass 1;
}

location / {
    proxy_pass http://127.0.0.1:8082;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Forwarded-Host $host;
    proxy_connect_timeout 10s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;
}
